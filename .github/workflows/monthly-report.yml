name: CRM monthly report

# On the 1st of every month, email a performance report (TO Simon's wife, Simon CC'd) focused on the
# month that just ended, plus the trailing 3 completed months, the current month, and current+future
# by month. A gig = a Closed Won deal with a show date and a fee > $0 (zero-dollar gigs excluded).
# Logic + HTML live in monthly_report.py; this just runs it on the 1st.

on:
  schedule:
    - cron: '0 11 1 * *'      # 1st of the month, ~7am ET (EDT) / ~6am ET (EST)
  workflow_dispatch:

concurrency:
  group: crm-monthly-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
      DB_HOST:      ${{ vars.DB_HOST }}
      DB_USER:      ${{ vars.DB_USER }}
      DB_PORT:      ${{ vars.DB_PORT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Send monthly report
        run: python monthly_report.py --send
      - name: Alert Simon on failure
        if: failure()
        env:
          FAIL_LABEL: "monthly report"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python notify_fail.py
