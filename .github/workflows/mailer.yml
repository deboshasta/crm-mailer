name: CRM mailer

# ---------------------------------------------------------------------------
# Runs the CRM email sweep in the cloud so Simon's PC no longer has to be on.
# Each run sends: due-today client emails, any "Send now" flagged emails,
# self gig check-ins, trivia/photo received notices, and queues due SMS drafts.
# (The self-nags moved to nags.yml — they are once-a-day and don't need the
# 20-min cadence.) Every script is idempotent and date/gap guarded.
#
# Cadence is tiered to match Simon's working hours. Times below are UTC
# (GitHub cron only understands UTC). Simon is US Eastern:
#   - EDT (summer) = UTC-4   ->  the mapping in the comments
#   - EST (winter) = UTC-5   ->  everything lands ~1 hour EARLIER local.
# The exact minute never matters (idempotent), so the DST drift is harmless.
# ---------------------------------------------------------------------------

on:
  schedule:
    # BACKSTOP ONLY - 5 runs/day. This is NOT the primary schedule.
    #
    # cron-job.org ("CRM Mailer Sweep", every 30 min) is the authoritative scheduler: it POSTs to
    # this repo's /dispatches endpoint and fires the repository_dispatch trigger below. That setup
    # exists because GitHub's own scheduled workflows proved unreliable - they get delayed or
    # skipped under load, which was silently dropping sends.
    #
    # So the cron here is only insurance against cron-job.org itself going down. 5 runs/day at
    # 5-hour spacing keeps email flowing in that case AND stays inside heartbeat.py's 6h staleness
    # threshold (MONITORS["mailer"]), so a cron-job.org outage degrades quietly instead of both
    # dropping sends and spamming false "mailer STOPPED" alerts.
    #
    # History: this file ran */20 during working hours (38/day) while cron-job.org ALSO dispatched
    # every 5 and every 10 minutes from two duplicate jobs - ~453 mailer runs/day, ~353 MB/day of
    # Supabase egress, most of it overnight when _cad_ok blocks sending anyway. Fixed 2026-07-18.
    - cron: '0 0,5,10,15,20 * * *'
  workflow_dispatch:        # lets you run it by hand from the Actions tab
  repository_dispatch:      # lets the app's "Send now" button kick a run instantly
    types: [send-now]

# Never let two sweeps overlap (a slow run + a "Send now" run could double-fire).
concurrency:
  group: crm-mailer
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
      DB_HOST:      ${{ vars.DB_HOST }}
      DB_USER:      ${{ vars.DB_USER }}
      DB_PORT:      ${{ vars.DB_PORT }}
      JOIN_PUSH_BASE: ${{ secrets.JOIN_PUSH_BASE }}   # out-of-band phone push (roadmap #5); no-ops if unset
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Send due + send-now + notifications
        run: python send_due.py --send
      # SMS draft enqueuer DISABLED 2026-07-18: it queues drafts into sms_outbox for a phone
      # consumer that isn't built yet (0 drafts ever sent). Re-enable this step once the Tasker
      # side (list_pending_sms / mark_sms) is live. Code + DB scaffolding are left intact.
      # - name: Queue due SMS drafts
      #   run: python sms_due.py
      # Self-nags moved to nags.yml (2x/day) — they are once-a-day reminders and were
      # re-fetching all deals on every 20-min sweep.
      - name: Alert Simon on failure
        if: failure()
        env:
          FAIL_LABEL: "mailer sweep"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python notify_fail.py
