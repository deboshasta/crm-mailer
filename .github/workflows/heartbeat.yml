name: CRM heartbeat

# Dead-man's switch (Failure alerting - Phase 2). Every few hours, compare the last-run stamps that
# send_due.py (mailer) and backup.py write into private.config against "now" and email Simon if either
# hasn't run in longer than expected - the only thing that catches "the automation silently STOPPED"
# (GitHub disabling scheduled workflows, a cron/quota hiccup), since in that case nothing else fires.
# This is an independent 3rd leg; the mailer sweep and nightly backup also cross-check each other.

on:
  schedule:
    - cron: '0 */6 * * *'      # every 6 hours. Thinned from */3 on 2026-07-18: the pg_cron backstop
                               # (db/heartbeat_external.sql, 'crm-external-heartbeat') already polls the
                               # same stamps every 30 min from INSIDE the database at zero egress, so a
                               # second external checker running 8x/day was redundant precision.
  workflow_dispatch:

concurrency:
  group: crm-heartbeat
  cancel-in-progress: false

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
      DB_HOST:      ${{ vars.DB_HOST }}
      DB_USER:      ${{ vars.DB_USER }}
      DB_PORT:      ${{ vars.DB_PORT }}
      JOIN_PUSH_BASE: ${{ secrets.JOIN_PUSH_BASE }}   # out-of-band phone push (roadmap #5); no-ops if unset
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Check automation heartbeats
        run: python heartbeat.py --check
      - name: Alert Simon on failure
        if: failure()
        env:
          FAIL_LABEL: "heartbeat check"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python notify_fail.py
