name: CRM eblast sender

# Dedicated workflow for bulk eblast sends — separate from the main mailer so
# a long-running batch never delays manual client emails.
# Triggered immediately by eblast-trigger.js when Simon schedules a campaign;
# subsequent batches (throttle_per_hour caps each sweep) are picked up by cron.

on:
  schedule:
    # Hourly, 9am-10pm ET (UTC-4 summer / UTC-5 winter). Thinned from */5 on 2026-07-18 (168 -> 14
    # runs/day): at */5 this polled every 5 minutes for campaigns Simon schedules a few times a
    # MONTH, and every idle tick still paid load_cfg() (settings + all of private.config + the
    # signature template) before discovering there was nothing to send. eblast_send.py now probes
    # for a due campaign BEFORE loading config, and eblast-trigger.js fires a repository_dispatch
    # the instant a campaign is scheduled — so this cron only picks up FOLLOW-UP batches after
    # throttle_per_hour caps a sweep, which is an hourly-scale concern, not a 5-minute one.
    # BACKSTOP ONLY - 3 runs/day. cron-job.org ("Eblast Trigger", hourly) is the primary scheduler
    # and fires this workflow through repository_dispatch; these exist only if that service is down.
    - cron: '0 14,18,22 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [eblast-send]

concurrency:
  group: crm-eblast
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
      DB_HOST:      ${{ vars.DB_HOST }}
      DB_USER:      ${{ vars.DB_USER }}
      DB_PORT:      ${{ vars.DB_PORT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Eblast send worker
        run: python eblast_send.py
      - name: Alert Simon on failure
        if: failure()
        env:
          FAIL_LABEL: "eblast sender"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python notify_fail.py
