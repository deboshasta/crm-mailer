name: CRM eblast sender

# Dedicated workflow for bulk eblast sends — separate from the main mailer so
# a long-running batch never delays manual client emails.
# Triggered immediately by eblast-trigger.js when Simon schedules a campaign;
# subsequent batches (throttle_per_hour caps each sweep) are picked up by cron.

on:
  schedule:
    # Every 5 min, 9am-10pm ET (UTC-4 summer / UTC-5 winter)
    - cron: '*/5 13-23 * * *'
    - cron: '*/5 0-2 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [eblast-send]

concurrency:
  group: crm-eblast
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      DB_PASSWORD:  ${{ secrets.DB_PASSWORD }}
      DB_HOST:      ${{ vars.DB_HOST }}
      DB_USER:      ${{ vars.DB_USER }}
      DB_PORT:      ${{ vars.DB_PORT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Eblast send worker
        run: python eblast_send.py
      - name: Alert Simon on failure
        if: failure()
        env:
          FAIL_LABEL: "eblast sender"
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python notify_fail.py
